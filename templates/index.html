<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Κατεδαφίσεις — Διαύγεια</title>
<link rel="icon" href="/static/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/static/icon.png">
<link rel="apple-touch-icon" href="/static/icon.png">
<link rel="stylesheet" href="/static/leaflet.css">
<link rel="stylesheet" href="/static/MarkerCluster.css">
<link rel="stylesheet" href="/static/MarkerCluster.Default.css">
<style>
  :root { --acc: #b3412c; --bg: #faf8f5; --line: #ddd6cc; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; margin: 0; background: var(--bg);
         color: #2a2620; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 1.2rem; }
  h1 { font-size: 1.4rem; margin: .2rem 0 .1rem; }
  .sub { color: #6b655a; font-size: .9rem; margin-bottom: 1rem; }
  .tabs { display: flex; gap: .4rem; border-bottom: 2px solid var(--line);
          margin-bottom: 1rem; }
  .tabs button { border: none; background: none; padding: .5rem .9rem;
          font-size: 1rem; cursor: pointer; border-bottom: 3px solid transparent;
          margin-bottom: -2px; color: #6b655a; }
  .tabs button.on { color: var(--acc); border-bottom-color: var(--acc);
          font-weight: 600; }
  form { display: flex; flex-wrap: wrap; gap: .8rem; align-items: flex-end; }
  label { display: flex; flex-direction: column; gap: .25rem; font-size: .85rem;
          color: #6b655a; }
  input { padding: .5rem .6rem; border: 1px solid var(--line); border-radius: 6px;
          font-size: 1rem; background: #fff; }
  #area { width: 24rem; max-width: 80vw; }
  button.go { background: var(--acc); color: #fff; border: none; padding: .6rem 1.4rem;
          border-radius: 6px; font-size: 1rem; cursor: pointer; }
  button.go:disabled { opacity: .5; cursor: default; }
  .ac { position: relative; }
  .ac-list { position: absolute; top: 100%; left: 0; right: 0; z-index: 10;
          background: #fff; border: 1px solid var(--line); border-radius: 0 0 8px 8px;
          max-height: 18rem; overflow-y: auto; box-shadow: 0 6px 16px rgba(0,0,0,.12); }
  .ac-list div { padding: .4rem .6rem; cursor: pointer; display: flex;
          justify-content: space-between; gap: 1rem; }
  .ac-list div:hover, .ac-list div.sel { background: #f3e9e0; }
  .ac-list .t { color: #998f80; font-size: .8rem; white-space: nowrap; }
  .err { color: #a8231f; margin-top: .7rem; }
  .hidden { display: none !important; }
  #progress { margin-top: 1.4rem; }
  .phase { font-weight: 600; margin-bottom: .4rem; }
  .bar { height: 10px; background: #eee5d8; border-radius: 5px; overflow: hidden; }
  .bar i { display: block; height: 100%; background: var(--acc); width: 0;
          transition: width .4s; }
  .bar.indet i { width: 30%; animation: slide 1.2s infinite linear; }
  @keyframes slide { from { margin-left: -30%; } to { margin-left: 100%; } }
  pre#log { background: #2a2620; color: #e8e2d6; padding: .8rem; border-radius: 8px;
          max-height: 14rem; overflow-y: auto; font-size: .8rem; margin-top: .8rem; }
  button.minor { background: none; border: 1px solid var(--line); padding: .45rem .9rem;
          border-radius: 6px; cursor: pointer; font-size: .9rem; margin-top: .6rem; }
  #results { margin-top: 1.6rem; }
  .dl { display: flex; flex-wrap: wrap; gap: .6rem; align-items: center;
          margin: .6rem 0 1rem; }
  .dl a.btn { background: #2e6b46; color: #fff; text-decoration: none;
          padding: .55rem 1.1rem; border-radius: 6px; }
  .dl a.btn.alt { background: #5a5346; }
  .dl button { background: #fff; }
  .filters { display: flex; flex-wrap: wrap; gap: .6rem; margin-bottom: .6rem; }
  .filters input, .filters select { padding: .4rem .5rem; border: 1px solid var(--line);
          border-radius: 6px; background: #fff; font-size: .9rem; }
  table { border-collapse: collapse; width: 100%; font-size: .82rem; background: #fff; }
  th, td { border: 1px solid var(--line); padding: .3rem .45rem; text-align: left;
          vertical-align: top; }
  th { background: #efe8dc; cursor: pointer; user-select: none; white-space: nowrap;
          position: sticky; top: 0; }
  td.desc { max-width: 26rem; }
  .tablewrap { max-height: 65vh; overflow: auto; border-radius: 6px; }
  .note { color: #6b655a; font-size: .85rem; margin: .5rem 0; }
  .runlist { display: flex; flex-direction: column; gap: .5rem;
          max-height: min(67rem, 75vh); overflow-y: auto; }  /* scroll στις ~20 εγγραφές */
  .runcard { background: #fff; border: 1px solid var(--line); border-radius: 8px;
          padding: .7rem 1rem; cursor: pointer; display: flex; flex-wrap: wrap;
          gap: .3rem 1.4rem; align-items: baseline; }
  .runcard:hover { border-color: var(--acc); }
  .runcard b { font-size: 1rem; }
  .runcard span { color: #6b655a; font-size: .85rem; }
  .runcard .del { margin: 0 0 0 auto; padding: .25rem .7rem; font-size: .8rem;
          color: #a8231f; border-color: #e0c4bc; background: none;
          border: 1px solid; border-radius: 6px; cursor: pointer; }
  .runcard .del:hover { background: #f8e8e4; }
  .runcard .cache { color: #9a5b2d; border-color: #e6cdb0; }
  .runcard .cache:hover { background: #f7ecdf; }
  #histtools { display: flex; gap: .5rem; margin-bottom: .6rem; }
  button.minor.danger { color: #a8231f; border-color: #e0c4bc; }
  button.minor.danger:hover { background: #f8e8e4; }
  button#clearallpdfs { color: #9a5b2d; border-color: #e6cdb0; }
  button#clearallpdfs:hover { background: #f7ecdf; }
  .tag { background: #e7f0e9; color: #2e6b46; border-radius: 4px; padding: .05rem .4rem;
          font-size: .75rem; }
  .tag.no { background: #f5e9e0; color: #9a5b2d; }
  .tag.busy { background: #e8eef7; color: #1d5fa8; animation: pulse 1.3s infinite; }
  @keyframes pulse { 50% { opacity: .45; } }
  a { color: #1d5fa8; }
  .viewtoggle { display: inline-flex; border: 1px solid var(--line); border-radius: 6px;
          overflow: hidden; margin-bottom: .6rem; }
  .viewtoggle button { border: none; background: #fff; padding: .4rem 1rem;
          cursor: pointer; font-size: .9rem; }
  .viewtoggle button.on { background: var(--acc); color: #fff; }
  .mapwrap { height: 65vh; border-radius: 6px; border: 1px solid var(--line); }
  .maplegend { display: flex; flex-wrap: wrap; gap: 1rem; font-size: .8rem;
          color: #6b655a; margin-top: .4rem; }
  .maplegend i { display: inline-block; width: .7rem; height: .7rem;
          border-radius: 50%; margin-right: .3rem; vertical-align: -1px; }
  .leaflet-popup-content { font-size: .82rem; }
  a.recenter { font-size: 20px; font-weight: 700; }
  #panel-about { max-width: 760px; line-height: 1.5; }
  .stats { display: flex; flex-wrap: wrap; gap: .7rem; margin: 1rem 0 1.4rem; }
  .statbox { flex: 1 1 8rem; background: #fff; border: 1px solid var(--line);
          border-radius: 8px; padding: .7rem .9rem; }
  .statval { font-size: 1.3rem; font-weight: 700; color: var(--acc); }
  .statlbl { font-size: .8rem; color: #6b655a; }
  .howto { padding-left: 1.2rem; }
  .howto li { margin: .35rem 0; }
  #panel-about h3 { margin: 1.2rem 0 .4rem; font-size: 1.05rem; }
</style>
<script src="/static/leaflet.js"></script>
<script src="/static/leaflet.markercluster.js"></script>
</head>
<body>
<div class="wrap">
  <h1>Κατεδαφίσεις</h1>
  <div class="sub">Άδειες κατεδάφισης από τη Διαύγεια (e-Άδειες/ΤΕΕ) — spreadsheet, PDF και συντεταγμένες</div>

  <div class="tabs">
    <button id="tab-search" class="on" onclick="showTab('search')">Νέα αναζήτηση</button>
    <button id="tab-history" onclick="showTab('history')">Ιστορικό</button>
    <button id="tab-about" onclick="showTab('about')">Σχετικά</button>
  </div>

  <section id="panel-search">
    <form id="form" autocomplete="off">
      <label>Περιοχή
        <span class="ac">
          <input id="area" placeholder="π.χ. Δήμος Δράμας, Νομός Καβάλας, Περιφέρεια Κρήτης" required>
          <div id="aclist" class="ac-list hidden"></div>
        </span>
      </label>
      <label>Από <input type="date" id="from" value="{{ start }}" min="{{ start }}" required></label>
      <label>Έως <input type="date" id="to" value="{{ today }}" required></label>
      <button class="go" id="go" type="submit">Εκκίνηση</button>
    </form>
    <div id="formerr" class="err hidden"></div>

    <div id="progress" class="hidden">
      <div class="phase" id="phaselabel"></div>
      <div class="bar" id="bar"><i id="barfill"></i></div>
      <button class="minor" id="cancel">Ακύρωση</button>
      <pre id="log"></pre>
    </div>

    <div id="results" class="hidden"></div>
  </section>

  <section id="panel-history" class="hidden">
    <div id="histtools" class="hidden">
      <button class="minor" id="clearallpdfs">Καθαρισμός όλων των PDF</button>
      <button class="minor danger" id="clearall">Διαγραφή όλων</button>
    </div>
    <div id="histlist" class="runlist"></div>
    <div id="histview" class="hidden">
      <button class="minor" onclick="backToList()">← Ιστορικό</button>
      <div id="histresults"></div>
    </div>
  </section>

  <section id="panel-about" class="hidden">
    <div id="aboutbody" class="note">Φόρτωση…</div>
  </section>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const dmy = iso => (iso || "").split("-").reverse().join("/");
const PHASES = { search: "Αναζήτηση στη Διαύγεια…", pdf: "Κατέβασμα και ανάλυση PDF",
                 upload: "Αποθήκευση αρχείων…",
                 geocode: "Γεωκωδικοποίηση (εμπλουτισμός — τα αρχεία είναι ήδη διαθέσιμα)" };
const MAXROWS = 500;

/* ---------- tabs ---------- */
function showTab(name) {
  for (const t of ["search", "history", "about"]) {
    $("tab-" + t).classList.toggle("on", t === name);
    $("panel-" + t).classList.toggle("hidden", t !== name);
  }
  if (name === "history") loadHistory();
  if (name === "about") loadAbout();
}
function backToList() {
  $("histview").classList.add("hidden");
  $("histlist").classList.remove("hidden");
}

/* ---------- autocomplete + \u03c0\u03c1\u03cc\u03c3\u03c6\u03b1\u03c4\u03b5\u03c2 \u03b1\u03bd\u03b1\u03b6\u03b7\u03c4\u03ae\u03c3\u03b5\u03b9\u03c2 ---------- */
let AREAS = null, acSel = -1, acItems = [];
const norm = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                   .toUpperCase().replace(/-/g, " ").replace(/\s+/g, " ").trim();
const RECENT_KEY = "demolitions.recent";
function getRecent() {
  try { return JSON.parse(localStorage.getItem(RECENT_KEY)) || []; }
  catch { return []; }
}
function pushRecent(area, from, to) {
  const r = getRecent().filter(x => x.area !== area);
  r.unshift({ area, from, to });
  localStorage.setItem(RECENT_KEY, JSON.stringify(r.slice(0, 8)));
}
async function ensureAreas() {
  if (!AREAS) AREAS = await (await fetch("/api/areas")).json();
}
function renderAc(items) {
  acItems = items; acSel = -1;
  const list = $("aclist");
  list.innerHTML = "";
  for (const it of items) {
    const d = document.createElement("div");
    d.innerHTML = `<span></span><span class="t"></span>`;
    d.firstChild.textContent = it.text;
    d.lastChild.textContent = it.sub;
    d.onmousedown = e => { e.preventDefault(); it.apply(); hideAc(); };
    list.appendChild(d);
  }
  list.classList.toggle("hidden", !items.length);
}
function showRecent() {
  renderAc(getRecent().map(x => ({
    text: x.area, sub: x.from ? dmy(x.from) + "\u2013" + dmy(x.to) : "\u03c0\u03c1\u03cc\u03c3\u03c6\u03b1\u03c4\u03b7",
    apply: () => {
      $("area").value = x.area;
      if (x.from) $("from").value = x.from;
      if (x.to) $("to").value = x.to;
    },
  })));
}
async function showPlaces(q) {
  await ensureAreas();
  const starts = AREAS.filter(a => a.norm.startsWith(q));
  const within = AREAS.filter(a => !a.norm.startsWith(q) && a.norm.includes(q));
  renderAc(starts.concat(within).slice(0, 12).map(a => ({
    text: a.label, sub: a.type, apply: () => { $("area").value = a.label; },
  })));
}
$("area").addEventListener("focus", () => {
  if (!$("area").value.trim()) showRecent();
});
$("area").addEventListener("input", () => {
  const q = norm($("area").value);
  if (q.length < 2) { q ? hideAc() : showRecent(); return; }
  showPlaces(q);
});
$("area").addEventListener("keydown", e => {
  if ($("aclist").classList.contains("hidden")) return;
  if (e.key === "ArrowDown") { acSel = Math.min(acSel + 1, acItems.length - 1); }
  else if (e.key === "ArrowUp") { acSel = Math.max(acSel - 1, 0); }
  else if (e.key === "Enter" && acSel >= 0) { e.preventDefault(); acItems[acSel].apply(); hideAc(); return; }
  else if (e.key === "Escape") { hideAc(); return; }
  else return;
  e.preventDefault();
  [...$("aclist").children].forEach((d, i) => d.classList.toggle("sel", i === acSel));
});
$("area").addEventListener("blur", () => setTimeout(hideAc, 150));
function hideAc() { $("aclist").classList.add("hidden"); acSel = -1; }

/* ---------- run + polling ---------- */
let cursor = 0, polling = null, rowsShownFor = null;
$("form").addEventListener("submit", async e => {
  e.preventDefault();
  $("formerr").classList.add("hidden");
  const body = { area: $("area").value, from: $("from").value, to: $("to").value };
  const r = await fetch("/api/run", { method: "POST",
    headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!r.ok) {
    $("formerr").textContent = (await r.json()).error;
    $("formerr").classList.remove("hidden");
    return;
  }
  pushRecent(body.area, body.from, body.to);
  $("results").classList.add("hidden");
  $("results").innerHTML = "";
  $("log").textContent = "";
  cursor = 0; rowsShownFor = null;
  startPolling();
});
$("cancel").addEventListener("click", () => fetch("/api/cancel", { method: "POST" }));
$("clearall").addEventListener("click", async () => {
  if (!confirm("Διαγραφή ΟΛΩΝ των αποθηκευμένων αναζητήσεων;\n\n" +
               "Θα διαγραφούν οριστικά όλα τα run και τα αρχεία τους " +
               "(Excel, PDF). Δεν αναιρείται.")) return;
  try {
    if (!(await fetch("/api/runs", { method: "DELETE" })).ok) throw 0;
  } catch { alert("Σφάλμα διαγραφής"); }
  loadHistory();
});
$("clearallpdfs").addEventListener("click", async () => {
  if (!confirm("Καθαρισμός των PDF όλων των αναζητήσεων;\n\n" +
               "Τα αποτελέσματα και τα Excel μένουν· ελευθερώνεται χώρος και " +
               "τα zip θα ξαναφτιάχνονται κατ' απαίτηση από τη Διαύγεια.")) return;
  try {
    if (!(await fetch("/api/pdfs", { method: "DELETE" })).ok) throw 0;
  } catch { alert("Σφάλμα"); }
  loadHistory();
});

function startPolling() {
  $("progress").classList.remove("hidden");
  $("go").disabled = true;
  if (!polling) polling = setInterval(poll, 1000);
  poll();
}
async function poll() {
  let s;
  try { s = await (await fetch("/api/status?since=" + cursor)).json(); }
  catch { return; }   // προσωρινό σφάλμα (π.χ. ξύπνημα host) — ξαναδοκιμάζει στο επόμενο tick
  cursor = s.cursor;
  if (s.log.length) {
    $("log").textContent += s.log.join("\n") + "\n";
    $("log").scrollTop = $("log").scrollHeight;
  }
  const active = s.state === "running" || s.state === "geocoding";
  $("phaselabel").textContent = PHASES[s.phase] || "Εκκίνηση…";
  if (s.n > 0) {
    $("bar").classList.remove("indet");
    $("barfill").style.width = (100 * s.i / s.n).toFixed(1) + "%";
    $("phaselabel").textContent += ` — ${s.i}/${s.n}`;
  } else {
    $("bar").classList.add("indet");
  }
  if (s.result && rowsShownFor !== s.result.run_id + s.state) {
    rowsShownFor = s.result.run_id + s.state;   // ξανά-render όταν αλλάζει φάση
    await renderResults($("results"), s.result, active && s.state === "geocoding");
    $("results").classList.remove("hidden");
  }
  if (!active) {
    clearInterval(polling); polling = null;
    $("go").disabled = false;
    if (s.state === "error") {
      $("formerr").textContent = s.error || "Σφάλμα";
      $("formerr").classList.remove("hidden");
      $("progress").classList.add("hidden");
    } else if (s.state === "cancelled") {
      $("phaselabel").textContent = "Ακυρώθηκε.";   // το progress μένει ορατό
      $("bar").classList.remove("indet");
    } else {
      $("progress").classList.add("hidden");
    }
  }
}

/* ---------- results view ---------- */
async function renderResults(container, manifest, geocodingNow) {
  let rows;
  try {
    rows = await (await fetch(
      `/api/runs/${encodeURIComponent(manifest.run_id)}/rows`)).json();
  } catch {
    container.innerHTML = `<div class="err">Αδυναμία φόρτωσης αποτελεσμάτων.</div>`;
    return;
  }
  container.innerHTML = "";
  const h = document.createElement("div");
  const dupNote = manifest.n_dups
    ? ` — ${manifest.n_dups} πιθανά διπλά (στήλη «Έλεγχος»)` : "";
  h.innerHTML = `<h2 style="margin:.2rem 0"></h2>
    <div class="note">${dmy(manifest.from)} έως ${dmy(manifest.to)} ·
      <b>${manifest.n_rows}</b> άδειες${dupNote}</div>
    <div class="dl">
      <a class="btn" href="${manifest.xlsx_url}">Λήψη Excel</a>
      <a class="btn alt" href="${manifest.zip_url}">Λήψη όλων (zip)</a>
    </div>`;
  h.querySelector("h2").textContent = manifest.area;
  if (!manifest.geocoded && !geocodingNow) {
    const b = document.createElement("button");
    b.className = "minor";
    b.textContent = "Προσθήκη συντεταγμένων";
    b.onclick = async () => {
      const r = await fetch("/api/geocode/" + manifest.run_id, { method: "POST" });
      if (r.ok) { showTab("search"); cursor = 0; rowsShownFor = null; startPolling(); }
      else { alert((await r.json()).error); }
    };
    h.querySelector(".dl").appendChild(b);
  } else if (!manifest.geocoded && geocodingNow) {
    h.querySelector(".dl").insertAdjacentHTML("beforeend",
      `<span class="tag no">συντεταγμένες σε εξέλιξη…</span>`);
  }
  container.appendChild(h);
  const box = buildTable(rows, manifest.run_id);
  container.appendChild(box);
  if (rows.some(r => r.lat != null)) addMapToggle(box, rows, manifest.run_id);
}

/* ---------- χάρτης ---------- */
const PREC_COLORS = { "κτίσμα (PDF)": "#7b2d8b", "οδός+αριθμός": "#2e6b46",
                      "οδός": "#1d5fa8", "οικισμός": "#c87f1b",
                      "δήμος": "#8a8273" };
const esc = s => String(s ?? "").replace(/[&<>"]/g,
  c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

function addMapToggle(box, rows, runId) {
  const toggle = document.createElement("div");
  toggle.className = "viewtoggle";
  toggle.innerHTML = `<button class="on">Πίνακας</button><button>Χάρτης</button>`;
  const [btnTable, btnMap] = toggle.children;
  box.insertBefore(toggle, box.querySelector(".tablewrap"));

  const mapDiv = document.createElement("div");
  mapDiv.className = "mapwrap hidden";
  const legend = document.createElement("div");
  legend.className = "maplegend hidden";
  legend.innerHTML = "Ακρίβεια: " + Object.entries(PREC_COLORS).map(
    ([k, c]) => `<span><i style="background:${c}"></i>${k}</span>`).join("");
  box.insertBefore(mapDiv, box.querySelector(".tablewrap"));
  box.insertBefore(legend, box.querySelector(".tablewrap"));

  let map = null, cluster = null, skipFit = false, activePoly = null;
  const markerByRow = new Map();
  function clearPoly() {
    if (activePoly) { map.removeLayer(activePoly); activePoly = null; }
  }
  function update(view) {
    cluster.clearLayers();
    clearPoly();                                 // μην αφήσεις ορφανό περίγραμμα
    markerByRow.clear();
    const pts = view.filter(r => r.lat != null);
    for (const r of pts) {
      const m = L.circleMarker([r.lat, r.lon], {
        radius: 7, weight: 1.5, color: "#fff", fillOpacity: .85,
        fillColor: PREC_COLORS[r.precision] || "#8a8273",
      });
      const addr = [r.odos, r.ar_apo].filter(Boolean).join(" ");
      m.bindPopup(
        `<b>${esc(dmy(r.date))}</b> — ${esc([addr, r.poli].filter(Boolean).join(", "))}<br>` +
        `${esc(r.dimos)}${r.orofoi ? ` · ${esc(r.orofoi)} όροφοι` : ""}` +
        `${r.eidos && r.eidos !== "κατεδάφιση" ? ` · ${esc(r.eidos)}` : ""}` +
        `${r.ektasi === "τμηματική/μερική" ? " · τμηματική/μερική" : ""}` +
        `${r.nonbuilding ? " · μη κτίσμα" : ""}<br>` +
        `${esc(r.perigrafi)}<br>` +
        `<a href="https://diavgeia.gov.gr/decision/view/${esc(r.ada)}" target="_blank">${esc(r.ada)}</a>` +
        (r.pdf_path ? ` · <a href="/runs/${esc(runId)}/${esc(r.pdf_path)}" target="_blank">PDF</a>` : "") +
        ` · <a href="https://www.openstreetmap.org/?mlat=${r.lat}&mlon=${r.lon}#map=18/${r.lat}/${r.lon}" target="_blank">OSM</a>` +
        ` · <span style="color:${PREC_COLORS[r.precision] || "#8a8273"}">${esc(r.precision)}</span>`);
      if (r.poly && r.poly.length >= 3) {   // περίγραμμα κτίσματος από το PDF
        m.on("popupopen", () => {
          clearPoly();
          activePoly = L.polygon(r.poly, { color: "#7b2d8b", weight: 2,
                                           fillOpacity: .25 }).addTo(map);
        });
        m.on("popupclose", clearPoly);
      }
      cluster.addLayer(m);
      markerByRow.set(r, m);
    }
    if (pts.length && !skipFit) {
      map.fitBounds(cluster.getBounds().pad(0.15), { maxZoom: 16 });
    }
    const missing = view.length - pts.length;
    box.querySelector(".tnote").textContent = missing
      ? `${pts.length} σημεία στον χάρτη — ${missing} άδειες χωρίς συντεταγμένες δεν εμφανίζονται.`
      : `${pts.length} σημεία στον χάρτη`;
  }
  function ensureMap() {
    if (map) return;
    map = L.map(mapDiv).setView([38.3, 24.0], 6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19, subdomains: "abc",
      attribution: "© OpenStreetMap contributors",
    }).addTo(map);
    cluster = L.markerClusterGroup({ maxClusterRadius: 40 });
    map.addLayer(cluster);
    const Recenter = L.Control.extend({
      options: { position: "topleft" },
      onAdd() {
        const div = L.DomUtil.create("div", "leaflet-bar");
        const a = L.DomUtil.create("a", "recenter", div);
        a.href = "#"; a.title = "Επαναφορά στα αποτελέσματα";
        a.textContent = "⌖";
        L.DomEvent.on(a, "click", e => {
          L.DomEvent.preventDefault(e);
          if (cluster.getLayers().length)
            map.fitBounds(cluster.getBounds().pad(0.15), { maxZoom: 16 });
        });
        return div;
      },
    });
    map.addControl(new Recenter());
    box._onFilter = v => { if (!mapDiv.classList.contains("hidden")) update(v); };
  }
  function showMap(on) {
    btnTable.classList.toggle("on", !on);
    btnMap.classList.toggle("on", on);
    box.querySelector(".tablewrap").classList.toggle("hidden", on);
    mapDiv.classList.toggle("hidden", !on);
    legend.classList.toggle("hidden", !on);
  }
  // ο Leaflet πρέπει να μετρήσει το container ΑΦΟΥ γίνει ορατό (layout)·
  // αλλιώς φορτώνει σπασμένο/μετατοπισμένο πλέγμα tiles — γι' αυτό rAF
  function refresh(after) {
    requestAnimationFrame(() => {
      map.invalidateSize();
      update(box._filtered);
      if (after) after();
    });
  }
  btnTable.onclick = () => {
    showMap(false);
    box.querySelector(".ftext").dispatchEvent(new Event("input"));  // σημείωση πίνακα
  };
  btnMap.onclick = () => { ensureMap(); showMap(true); refresh(); };
  box._showOnMap = r => {
    ensureMap();
    showMap(true);
    skipFit = true;
    refresh(() => {
      skipFit = false;
      const m = markerByRow.get(r);
      if (m) cluster.zoomToShowLayer(m, () => m.openPopup());
    });
  };
}

// [επικεφαλίδα, τιμή, css class, σύνδεσμος, τιμή ταξινόμησης, ενέργεια]
const COLS = [
  ["Ημ/νία", r => dmy(r.date), null, null, r => r.date],
  ["Δήμος", r => r.dimos],
  ["Πόλη/Οικισμός", r => r.poli],
  ["Οδός", r => (r.odos + " " + (r.ar_apo || "")).trim()],
  ["Όροφοι", r => r.orofoi ?? ""],
  ["Περιγραφή", r => r.perigrafi, "desc"],
  ["Χάρτης", r => r.lat != null ? "📍" : "", null, null,
    r => r.lat != null ? 1 : 0, "map"],
  ["ΑΔΑ", r => r.ada, null,
    r => `https://diavgeia.gov.gr/decision/view/${r.ada}`],
  ["PDF", r => r.pdf_path ? "PDF" : "", null,
    (r, runId) => r.pdf_path ? `/runs/${runId}/${r.pdf_path}` : null],
  ["Έλεγχος", r => r.flags],
];

function buildTable(rows, runId) {
  const box = document.createElement("div");
  const dimoi = [...new Set(rows.map(r => r.dimos))].sort();
  const orofoi = [...new Set(rows.map(r => r.orofoi).filter(x => x != null))].sort((a, b) => a - b);
  const eidi = [...new Set(rows.map(r => r.eidos || "κατεδάφιση"))].sort();
  box.innerHTML = `<div class="filters">
      <input class="ftext" placeholder="Φίλτρο κειμένου (οδός, περιγραφή…)">
      <select class="fdimos"><option value="">Όλοι οι δήμοι</option></select>
      <select class="feidos"><option value="">Όλα τα είδη αδειών</option></select>
      <select class="fektasi"><option value="">Ολικές και τμηματικές</option>
        <option value="ολική">Μόνο ολικές</option>
        <option value="τμηματική/μερική">Μόνο τμηματικές/μερικές</option></select>
      <select class="fktisma"><option value="">Κτίρια και μη</option>
        <option value="build">Μόνο κτίρια</option>
        <option value="non">Μόνο μη-κτίρια (τοιχία/περιφράξεις)</option></select>
      <select class="forofoi"><option value="">Όλοι οι όροφοι</option></select>
      <select class="fdup"><option value="">Όλες οι εγγραφές</option>
        <option value="clean">Χωρίς πιθανά διπλά</option></select>
    </div>
    <div class="tablewrap"><table><thead><tr></tr></thead><tbody></tbody></table></div>
    <div class="note tnote"></div>`;
  const fd = box.querySelector(".fdimos");
  for (const d of dimoi) fd.add(new Option(d, d));
  const fe = box.querySelector(".feidos");
  for (const e of eidi) fe.add(new Option(e, e));
  const fo = box.querySelector(".forofoi");
  for (const o of orofoi) fo.add(new Option(o, o));
  const fx = box.querySelector(".fektasi");
  const fk = box.querySelector(".fktisma");
  if (dimoi.length < 2) fd.classList.add("hidden");
  if (eidi.length < 2) fe.classList.add("hidden");
  if (new Set(rows.map(r => r.ektasi || "ολική")).size < 2)
    fx.classList.add("hidden");
  if (!rows.some(r => r.nonbuilding)) fk.classList.add("hidden");

  const tr = box.querySelector("thead tr");
  let sortKey = 0, sortDir = 1;
  COLS.forEach(([name], idx) => {
    const th = document.createElement("th");
    th.textContent = name;
    th.onclick = () => { sortDir = sortKey === idx ? -sortDir : 1; sortKey = idx; redraw(); };
    tr.appendChild(th);
  });

  function redraw() {
    const q = norm(box.querySelector(".ftext").value);
    const dim = fd.value, oro = fo.value, dup = box.querySelector(".fdup").value;
    const eid = fe.value, ekt = fx.value, ktisma = fk.value;
    let view = rows.filter(r =>
      (!dim || r.dimos === dim) &&
      (!eid || (r.eidos || "κατεδάφιση") === eid) &&
      (!ekt || (r.ektasi || "ολική") === ekt) &&
      (!ktisma || (ktisma === "build" ? !r.nonbuilding : !!r.nonbuilding)) &&
      (!oro || String(r.orofoi) === oro) &&
      (!dup || !(r.flags || "").includes("πιθανό διπλό")) &&
      (!q || norm([r.odos, r.poli, r.perigrafi, r.dim_enotita, r.ada].join(" ")).includes(q)));
    const get = COLS[sortKey][4] || COLS[sortKey][1];
    view.sort((a, b) => {
      const x = get(a), y = get(b);
      return (x === y ? 0 : x > y ? 1 : -1) * sortDir;
    });
    box._filtered = view;
    if (box._onFilter) box._onFilter(view);
    const total = view.length;
    view = view.slice(0, MAXROWS);
    const tbody = box.querySelector("tbody");
    tbody.innerHTML = "";
    for (const r of view) {
      const trow = document.createElement("tr");
      for (const [, get2, cls, href, , action] of COLS) {
        const td = document.createElement("td");
        if (cls) td.className = cls;
        const url = href && href(r, runId);
        if (action === "map" && r.lat != null) {
          const a = document.createElement("a");
          a.href = "#"; a.textContent = "📍";
          a.title = "Εμφάνιση στον χάρτη";
          a.style.textDecoration = "none";
          a.onclick = e => {
            e.preventDefault();
            if (box._showOnMap) box._showOnMap(r);
          };
          td.appendChild(a);
        } else if (url) {
          const a = document.createElement("a");
          a.href = url; a.target = "_blank"; a.textContent = get2(r);
          td.appendChild(a);
        } else {
          td.textContent = get2(r);
        }
        trow.appendChild(td);
      }
      tbody.appendChild(trow);
    }
    box.querySelector(".tnote").textContent = total > MAXROWS
      ? `Εμφανίζονται οι πρώτες ${MAXROWS} από ${total} εγγραφές — περιορίστε με τα φίλτρα.`
      : `${total} εγγραφές`;
  }
  box.querySelectorAll("input,select").forEach(el => el.addEventListener("input", redraw));
  redraw();
  return box;
}

/* ---------- history ---------- */
async function loadHistory() {
  const list = $("histlist");
  list.classList.remove("hidden");
  $("histview").classList.add("hidden");
  let runs;
  try { runs = await (await fetch("/api/runs")).json(); }
  catch { list.innerHTML = `<div class="note">Αδυναμία φόρτωσης ιστορικού.</div>`; return; }
  // εργαλεία μαζικής διαχείρισης μόνο όταν υπάρχουν αποθηκευμένα (μη ενεργά) run
  $("histtools").classList.toggle("hidden", !runs.some(m => !m.active));
  $("clearallpdfs").classList.toggle("hidden",
    !runs.some(m => !m.active && m.has_pdfs && m.pdf_bytes));
  list.innerHTML = runs.length ? "" : `<div class="note">Δεν υπάρχουν αποθηκευμένα runs.</div>`;
  for (const m of runs) {
    const d = document.createElement("div");
    d.className = "runcard";
    const status = m.active
      ? `<span class="tag busy">${m.active === "geocoding"
          ? "γεωκωδικοποίηση σε εξέλιξη…" : "αναζήτηση σε εξέλιξη…"}</span>`
      : `<span class="tag ${m.geocoded ? "" : "no"}">${m.geocoded
          ? "με συντεταγμένες" : "χωρίς συντεταγμένες"}</span>`;
    const size = m.total_bytes ? `<span title="χώρος στον δίσκο">${fmtBytes(m.total_bytes)}</span>` : "";
    const clearBtn = (!m.active && m.has_pdfs && m.pdf_bytes)
      ? `<button class="del cache">Καθαρισμός PDF</button>` : "";
    d.innerHTML = `<b></b><span>${dmy(m.from)} – ${dmy(m.to)}</span>
      <span>${m.n_rows == null ? "—" : m.n_rows + " άδειες"}</span>
      ${status}
      ${size}
      <span>${dmy(m.created)}</span>
      ${clearBtn}
      ${m.active ? "" : '<button class="del">Διαγραφή</button>'}`;
    d.querySelector("b").textContent = m.area;
    d.onclick = async () => {
      if (m.active) { showTab("search"); return; }  // η πρόοδος φαίνεται εκεί
      list.classList.add("hidden");
      $("histview").classList.remove("hidden");
      await renderResults($("histresults"), m, false);
    };
    if (m.active) { list.appendChild(d); continue; }
    const cacheBtn = d.querySelector(".cache");
    if (cacheBtn) cacheBtn.onclick = async e => {
      e.stopPropagation();
      if (!confirm(`Καθαρισμός των PDF του run «${m.area}» (${fmtBytes(m.pdf_bytes)});\n\n` +
                   `Τα μεταδεδομένα και το Excel μένουν· το zip θα ξαναφτιάχνεται ` +
                   `κατ' απαίτηση από τη Διαύγεια.`)) return;
      const r = await fetch(`/api/runs/${encodeURIComponent(m.run_id)}/pdfs`,
                            { method: "DELETE" });
      if (!r.ok) alert((await r.json()).error || "Σφάλμα");
      loadHistory();
    };
    d.querySelector(".del:not(.cache)").onclick = async e => {
      e.stopPropagation();
      if (!confirm(`Διαγραφή του run «${m.area}» (${dmy(m.from)} – ${dmy(m.to)});\n\n` +
                   `ΠΡΟΣΟΧΗ: θα διαγραφούν οριστικά και όλα τα αρχεία του ` +
                   `(Excel, PDF, zip).`)) return;
      const r = await fetch(`/api/runs/${encodeURIComponent(m.run_id)}`,
                            { method: "DELETE" });
      if (!r.ok) alert((await r.json()).error || "Σφάλμα διαγραφής");
      loadHistory();
    };
    list.appendChild(d);
  }
}

/* ---------- σχετικά ---------- */
function fmtBytes(n) {
  if (!n) return "0 MB";
  const mb = n / 1048576;
  return mb >= 1024 ? (mb / 1024).toFixed(2) + " GB" : mb.toFixed(1) + " MB";
}
function fmtUptime(s) {
  const d = Math.floor(s / 86400), h = Math.floor(s % 86400 / 3600),
        m = Math.floor(s % 3600 / 60);
  return (d ? d + "η " : "") + (h || d ? h + "ω " : "") + m + "λ";
}
async function loadAbout() {
  const b = $("aboutbody");
  b.textContent = "Φόρτωση…";
  let a;
  try { a = await (await fetch("/api/about")).json(); }
  catch { b.textContent = "Αδυναμία φόρτωσης στατιστικών."; return; }
  const stat = (label, val) =>
    `<div class="statbox"><div class="statval">${val}</div>` +
    `<div class="statlbl">${label}</div></div>`;
  b.innerHTML = `
    <p>Εργαλείο χαρτογράφησης των αδειών κατεδάφισης στην Ελλάδα, με δεδομένα
       από τη <b>Διαύγεια</b> (οικοδομικές πράξεις του ΤΕΕ / e-Άδειες). Στο
       πνεύμα της έρευνας της «Καθημερινής»
       <a href="https://www.kathimerini.gr/investigations/563435530/o-diarkis-thanatos-tis-monokatoikias/" target="_blank">«Ο διαρκής θάνατος της μονοκατοικίας»</a>.</p>

    <div class="stats">
      ${stat("αναζητήσεις", a.n_runs)}
      ${stat("άδειες κατεδάφισης", a.n_permits.toLocaleString("el"))}
      ${stat("αποθήκευση", fmtBytes(a.storage_bytes))}
      ${stat("PDF σε cache", fmtBytes(a.pdf_bytes) + " / " + fmtBytes(a.pdf_cap))}
      ${stat("σε λειτουργία", fmtUptime(a.uptime_seconds))}
      ${stat("αποθήκη", a.backend === "r2" ? "Cloudflare R2" : "τοπικός δίσκος")}
    </div>

    <h3>Οδηγίες χρήσης</h3>
    <ol class="howto">
      <li><b>Νέα αναζήτηση</b>: γράψε μια <b>περιοχή</b> στο πεδίο (αρχίζοντας
        να πληκτρολογείς εμφανίζονται προτάσεις — δήμος, νομός/ΠΕ, περιφέρεια,
        ή «Ελλάδα»· με κενό πεδίο βλέπεις τις πρόσφατες αναζητήσεις σου).</li>
      <li>Διάλεξε <b>διάστημα</b> ημερομηνιών. Τα δεδομένα ξεκινούν
        ${dmy(a.data_since)} (έναρξη e-Άδειες) — νωρίτερα δεν υπάρχουν άδειες.</li>
      <li>Πάτησε <b>Εκκίνηση</b>. Το spreadsheet (Excel) και ο πίνακας
        εμφανίζονται <b>αμέσως</b>· οι <b>συντεταγμένες</b> προστίθενται μετά
        ως εμπλουτισμός (μπορείς να συνεχίσεις να δουλεύεις).</li>
      <li>Στα αποτελέσματα: <b>Λήψη Excel</b> ή <b>zip</b> (όλα τα PDF),
        διαδραστικός <b>πίνακας</b> (ταξινόμηση/φίλτρα: δήμος, είδος,
        ολική/τμηματική, όροφοι), και προβολή <b>Χάρτη</b>. Το 📍 κάθε γραμμής
        πάει στη θέση της στον χάρτη· η στήλη ΑΔΑ ανοίγει την πράξη στη Διαύγεια.</li>
      <li><b>Ιστορικό</b>: παλιότερες αναζητήσεις — άνοιγμα, λήψη ή διαγραφή.</li>
    </ol>
    <p class="note">Μετράει μόνο <b>τελικές</b> άδειες (όχι προεγκρίσεις/
      αναθεωρήσεις). Πλήρης μεθοδολογία & παραδοχές στον
      <a href="${a.github}/blob/main/${encodeURIComponent("ΟΔΗΓΟΣ.md")}" target="_blank">Οδηγό χρήσης</a>.</p>

    <p class="note">
      Πηγαίος κώδικας: <a href="${a.github}" target="_blank">${a.github.replace("https://", "")}</a>
      ${a.version ? " · έκδοση " + a.version : ""}<br>
      Δημιουργήθηκε από τον Φίλιππο Φεϊζίδη · © ${new Date().getFullYear()}
    </p>`;
}

/* ---------- resume on load ---------- */
(async () => {
  const s = await (await fetch("/api/status?since=0")).json();
  if (s.state === "running" || s.state === "geocoding") startPolling();
})();
</script>
